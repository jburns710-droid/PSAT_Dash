<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTSS Data Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEME: Navy (default) ── */
:root,[data-theme="navy"]{
  --bg:        #0f1f3d;
  --navy:      #0f1f3d;--navy2:#162847;--navy3:#1e3560;
  --slate:     #334e7a;--slate2:#4a6a9e;
  --text:      #f0f4fc;--text2:#a8bcdc;--text3:#6a8ab8;
  --surface:   #1a2e52;--surface2:#223660;--surface3:#0d1a30;
  --border:    #2a4070;--border2:#3a5590;
  --accent:    #4a9ee0;
  --critical:#e05252;--critical-bg:#2d1010;--critical-light:#f4a0a0;
  --flagged:#e0803a;--flagged-bg:#2d1a08;--flagged-light:#f4c090;
  --watch:#d4b832;--watch-bg:#2a2208;--watch-light:#f0e090;
  --typical:#a8bcdc;--typical-bg:#1a2e52;
  --strength:#52c48a;--strength-bg:#0d2a1a;--strength-light:#90e0b4;
  --above:#4a9ee0;--above-bg:#0d1a2d;--above-light:#90c8f4;
  --font-sans:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

/* ── THEME: Slate (warm off-white light mode) ── */
[data-theme="slate"]{
  --bg:        #f2f0eb;
  --navy:      #f2f0eb;--navy2:#e8e5de;--navy3:#dedad2;
  --slate:     #c8c3b8;--slate2:#a09890;
  --text:      #1a1714;--text2:#3d3832;--text3:#7a7268;
  --surface:   #faf8f5;--surface2:#eceae4;--surface3:#e4e1da;
  --border:    #d4d0c8;--border2:#bdb9b0;
  --accent:    #2d6fa8;
  --critical:#c0392b;--critical-bg:#fdecea;--critical-light:#7b1c14;
  --flagged:#c0622b;--flagged-bg:#fdf0ea;--flagged-light:#7a3518;
  --watch:#9a7d0a;--watch-bg:#fdf8e1;--watch-light:#5c4a06;
  --typical:#7a7268;--typical-bg:#eceae4;
  --strength:#217a4f;--strength-bg:#e8f5ee;--strength-light:#0f4a2c;
  --above:#2d6fa8;--above-bg:#e8f0f8;--above-light:#1a4468;
  --font-sans:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

/* ── THEME: Obsidian (true dark, high contrast) ── */
[data-theme="obsidian"]{
  --bg:        #0d0d0d;
  --navy:      #0d0d0d;--navy2:#141414;--navy3:#1a1a1a;
  --slate:     #2a2a2a;--slate2:#3d3d3d;
  --text:      #e8e8e8;--text2:#a8a8a8;--text3:#606060;
  --surface:   #161616;--surface2:#1e1e1e;--surface3:#0a0a0a;
  --border:    #2a2a2a;--border2:#3a3a3a;
  --accent:    #58a6e6;
  --critical:#e05252;--critical-bg:#1c0a0a;--critical-light:#f4a0a0;
  --flagged:#e08040;--flagged-bg:#1c1008;--flagged-light:#f4c090;
  --watch:#d4b832;--watch-bg:#1a1608;--watch-light:#f0e090;
  --typical:#a8a8a8;--typical-bg:#161616;
  --strength:#4ec98a;--strength-bg:#0a1c12;--strength-light:#90e0b4;
  --above:#58a6e6;--above-bg:#0a1220;--above-light:#90c8f4;
  --font-sans:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

/* ── Scale system ── */
.main-panel{font-size:1em}
.main-panel.scale-sm{font-size:0.88em}
.main-panel.scale-md{font-size:1em}
.main-panel.scale-lg{font-size:1.15em}
.main-panel.scale-xl{font-size:1.30em}

body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:15px;min-height:100vh;transition:background 0.2s,color 0.2s}

/* ── Header ── */
.app-header{background:var(--navy3);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:stretch;gap:0}
.app-logo{padding:16px 20px 16px 0;border-right:1px solid var(--border);margin-right:8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#4a9ee0,#52c48a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:500;font-size:14px;color:#fff}
.logo-text{font-size:15px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.logo-sub{font-size:14px;color:var(--text3);font-family:var(--font-mono)}
.nav-tabs{display:flex;align-items:stretch;gap:2px;padding:0 8px;flex:1;overflow-x:auto}
.tab-btn{background:none;border:none;color:var(--text3);font-family:var(--font-sans);font-size:14px;font-weight:400;padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;letter-spacing:0.02em}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);border-bottom-color:#4a9ee0;font-weight:500}
.header-actions{display:flex;align-items:center;gap:8px;padding:0 0 0 16px;border-left:1px solid var(--border);margin-left:auto;flex-shrink:0}
.btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-family:var(--font-sans);font-size:14px;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all 0.15s;font-weight:400}
.btn:hover{background:var(--slate);color:var(--text);border-color:var(--slate2)}
.btn-primary{background:#1e5fa0;border-color:#2a7ac8;color:#c8e4ff}
.btn-primary:hover{background:#2470b8}
.btn-sm{padding:4px 10px;font-size:14px}
.btn-danger{background:#2d1010;border-color:var(--critical);color:var(--critical-light)}
.btn-danger:hover{background:#3d1818}
.btn-success{background:var(--strength-bg);border-color:var(--strength);color:var(--strength-light)}

/* ── Layout ── */
.app-body{display:flex;height:calc(100vh - 57px)}
.main-panel{flex:1;overflow:auto;padding:24px}

/* ── Panel headers ── */
.panel-header{margin-bottom:20px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.panel-header-left{flex:1}
.panel-title{font-size:19px;font-weight:600;color:var(--text);margin-bottom:4px}
.panel-sub{font-size:14px;color:var(--text3);font-family:var(--font-mono)}

/* ── Window toggle ── */
.window-toggle{display:flex;background:var(--surface3);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.win-btn{background:none;border:none;color:var(--text3);font-family:var(--font-mono);font-size:14px;padding:6px 16px;cursor:pointer;transition:all 0.15s;border-right:1px solid var(--border)}
.win-btn:last-child{border-right:none}
.win-btn.active{background:var(--surface2);color:var(--text);font-weight:500}
.win-btn.disabled{opacity:0.35;cursor:not-allowed}

/* ── Metric cards ── */
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.metric-label{font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:500;font-family:var(--font-mono);color:var(--text)}
.metric-sub{font-size:14px;color:var(--text3);margin-top:3px}

/* ── Status badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:14px;font-family:var(--font-mono);font-weight:500;letter-spacing:0.04em;white-space:nowrap}
.badge-critical{background:var(--critical-bg);color:var(--critical-light);border:1px solid var(--critical)}
.badge-flagged{background:var(--flagged-bg);color:var(--flagged-light);border:1px solid var(--flagged)}
.badge-watch{background:var(--watch-bg);color:var(--watch-light);border:1px solid var(--watch)}
.badge-typical{background:var(--typical-bg);color:var(--typical);border:1px solid var(--border)}
.badge-strength{background:var(--strength-bg);color:var(--strength-light);border:1px solid var(--strength)}
.badge-above{background:var(--above-bg);color:var(--above-light);border:1px solid var(--above)}
.badge-pm2{background:#1a1a3a;color:#a0a0f4;border:1px solid #5050c8;font-size:14px}
.badge-pm3{background:#2a0a2a;color:#e0a0e0;border:1px solid #a050a0;font-size:14px}

/* ── Tables ── */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--surface);color:var(--text3);font-weight:500;font-family:var(--font-mono);font-size:14px;text-transform:uppercase;letter-spacing:0.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface)}
td.mono{font-family:var(--font-mono);font-size:14px}
td.right{text-align:right}
td.center{text-align:center}
td.name{color:var(--text);font-weight:400}

/* ── Tiered heatmap 2x2 grid ── */
.heatmap-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;
}
@media(max-width:900px){.heatmap-grid{grid-template-columns:1fr}}

.hm-tier-panel{
  border-radius:10px;overflow:hidden;border:1px solid var(--border);
  display:flex;flex-direction:column;
}
.hm-tier-panel-header{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);
}
.hm-tier-panel-header:hover{filter:brightness(1.06)}
.hm-tier-panel-header.critical{background:var(--critical-bg)}
.hm-tier-panel-header.flagged{background:var(--flagged-bg)}
.hm-tier-panel-header.watch{background:var(--watch-bg)}
.hm-tier-panel-header.typical{background:var(--surface2)}
.hm-tier-panel-title{font-size:15px;font-weight:700;letter-spacing:0.02em;flex:1}
.hm-tier-panel-title.critical{color:var(--critical-light)}
.hm-tier-panel-title.flagged{color:var(--flagged-light)}
.hm-tier-panel-title.watch{color:var(--watch-light)}
.hm-tier-panel-title.typical{color:var(--strength-light)}
.hm-tier-panel-count{font-size:14px;font-family:var(--font-mono);color:var(--text3)}
.hm-tier-panel-chevron{font-size:14px;color:var(--text3);transition:transform 0.2s}
.hm-tier-panel-chevron.open{transform:rotate(180deg)}

/* Summary chart inside panel */
.hm-chart-body{
  background:var(--surface);padding:16px;flex:1;
}
.hm-chart-title{
  font-size:14px;color:var(--text3);font-family:var(--font-mono);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px;
}
.hm-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hm-bar-row:last-child{margin-bottom:0}
.hm-bar-domain{font-size:14px;color:var(--text2);width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-bar-outer{flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.hm-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.hm-bar-fill.critical{background:var(--critical)}
.hm-bar-fill.flagged{background:var(--flagged)}
.hm-bar-fill.watch{background:var(--watch)}
.hm-bar-fill.typical{background:var(--strength)}
.hm-bar-count{font-size:14px;font-family:var(--font-mono);color:var(--text2);width:24px;text-align:right;flex-shrink:0}
.hm-empty{font-size:14px;color:var(--text3);padding:20px;text-align:center}

/* Student list inside panel */
.hm-student-list{background:var(--surface);border-top:1px solid var(--border)}
.hm-list-header{
  display:flex;align-items:center;gap:0;
  padding:6px 0;border-bottom:1px solid var(--border);
  background:var(--surface3);
}
.hm-list-th{font-size:14px;font-family:var(--font-mono);color:var(--text3);
  text-transform:uppercase;letter-spacing:0.06em;padding:0 12px;}
.hm-list-th.name{flex:0 0 130px}
.hm-list-th.weak{flex:0 0 100px}
.hm-list-th.total{flex:0 0 60px}
.hm-list-th.domains{flex:1}

.hm-srow{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border);min-height:38px;
  cursor:pointer;transition:background 0.1s;
}
.hm-srow:last-child{border-bottom:none}
.hm-srow:hover{background:var(--surface2)}
.hm-srow-name{
  flex:0 0 130px;padding:8px 12px;
  font-size:14px;font-weight:500;color:var(--accent);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hm-srow-weak{
  flex:0 0 100px;padding:8px 12px;
  font-size:14px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hm-srow-total{
  flex:0 0 60px;padding:8px 8px;
  font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--text);
}
.hm-srow-domains{
  flex:1;display:flex;gap:4px;padding:6px 8px;flex-wrap:wrap;align-items:center;
}
.hm-chip{
  display:flex;flex-direction:column;align-items:center;
  border-radius:4px;padding:3px 6px;min-width:38px;gap:1px;
}
.hm-chip-lbl{font-size:14px;font-family:var(--font-mono);opacity:0.8;text-transform:uppercase}
.hm-chip-val{font-size:14px;font-weight:700;font-family:var(--font-mono)}
.hm-chip.critical{background:var(--critical-bg);color:var(--critical-light);border:1px solid var(--critical)}
.hm-chip.flagged{background:var(--flagged-bg);color:var(--flagged-light);border:1px solid var(--flagged)}
.hm-chip.watch{background:var(--watch-bg);color:var(--watch-light);border:1px solid var(--watch)}
.hm-chip.typical{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.hm-chip.strength{background:var(--strength-bg);color:var(--strength-light);border:1px solid var(--strength)}

/* domain toggle button */
.domain-toggle-btn{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--font-mono);font-size:14px;
  padding:6px 14px;border-radius:6px;cursor:pointer;transition:all 0.15s;
}
.domain-toggle-btn:hover{background:var(--slate);color:var(--text)}

/* ── Star twinkle animation ── */
@keyframes twinkle{
  0%,100%{opacity:1;transform:scale(1) rotate(0deg)}
  25%{opacity:0.6;transform:scale(1.3) rotate(15deg)}
  50%{opacity:1;transform:scale(0.9) rotate(-10deg)}
  75%{opacity:0.7;transform:scale(1.2) rotate(5deg)}
}
.star-badge{
  display:inline-block;font-size:16px;
  animation:twinkle 2s ease-in-out infinite;
  margin-left:4px;cursor:default;
}

/* ── Domain card progress stat rows ── */
.dc-progress-stats{
  display:flex;flex-direction:column;gap:0;
  margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.dc-progress-row{
  display:flex;flex-direction:column;
  padding:12px 14px;border-bottom:1px solid var(--border);gap:6px;
}
.dc-progress-row:last-child{border-bottom:none}
.dc-progress-header{
  display:flex;justify-content:space-between;align-items:center;
}
.dc-progress-label{font-size:14px;color:var(--text2);font-weight:400}
.dc-progress-val{
  font-size:15px;font-weight:600;font-family:var(--font-mono);color:var(--text);
  display:flex;align-items:center;gap:4px;
}
.dc-progress-track{
  width:100%;height:8px;background:var(--border);border-radius:4px;
  overflow:hidden;position:relative;
}
.dc-progress-fill{
  height:100%;border-radius:4px;transition:width 0.4s ease;
  position:relative;
}
.dc-progress-fill.above{background:var(--strength)}
.dc-progress-fill.near{background:var(--watch)}
.dc-progress-fill.below{background:var(--critical)}
.dc-progress-sub{
  font-size:14px;color:var(--text3);font-family:var(--font-mono);
}

/* ── Z-score footer on domain card ── */
.dc-footer{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-top:10px;border-top:1px solid var(--border);margin-top:4px;
  flex-wrap:wrap;gap:8px;
}
.dc-zscore-block{
  display:flex;flex-direction:column;gap:3px;align-items:flex-end;
}
.dc-zscore-label{font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.05em}
.dc-zscore-vals{display:flex;gap:8px;align-items:center}
.dc-zscore-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.dc-zscore-item-label{font-size:14px;color:var(--text3);font-family:var(--font-mono)}
.dc-zscore-item-val{font-size:14px;font-weight:500;font-family:var(--font-mono);color:var(--text3)}

/* z-score cells (keep for other tabs) */
.z-cell{font-family:var(--font-mono);font-size:14px;text-align:center;padding:7px 6px!important;border-radius:3px;white-space:nowrap}
.z-critical{background:var(--critical-bg);color:var(--critical-light)}
.z-flagged{background:var(--flagged-bg);color:var(--flagged-light)}
.z-watch{background:var(--watch-bg);color:var(--watch-light)}
.z-typical{color:var(--text3)}
.z-strength{background:var(--strength-bg);color:var(--strength-light)}

/* ══════════════════════════════════════════════
   INDIVIDUAL PROFILE — REFACTORED
══════════════════════════════════════════════ */
.profile-select-wrap{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px 20px;flex-wrap:wrap;
}
.profile-select-wrap label{font-size:14px;color:var(--text3);font-family:var(--font-mono);white-space:nowrap}
select{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--font-sans);font-size:14px;
  padding:8px 12px;border-radius:6px;cursor:pointer;outline:none;min-width:200px;
}
select:focus{border-color:#4a9ee0}
.profile-name{font-size:20px;font-weight:600;color:var(--text)}

/* Score overview bar */
.profile-score-bar{
  display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;
}
.profile-score-tile{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px 22px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;
}
.profile-score-tile-label{font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.07em}
.profile-score-tile-val{font-size:30px;font-weight:600;font-family:var(--font-mono);color:var(--text);line-height:1}
.profile-score-tile-sub{font-size:14px;color:var(--text3);margin-top:2px}

/* 2-col domain grid */
.profile-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-bottom:24px;
}
@media(max-width:580px){.profile-grid{grid-template-columns:1fr}}

/* Domain card — refactored */
.domain-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:20px 18px;
  display:flex;flex-direction:column;gap:0;
  transition:border-color 0.15s;
}
.domain-card:hover{border-color:var(--border2)}
.domain-card.card-critical{border-color:var(--critical);background:linear-gradient(160deg,var(--critical-bg) 0%,var(--surface) 60%)}
.domain-card.card-flagged{border-color:var(--flagged);background:linear-gradient(160deg,var(--flagged-bg) 0%,var(--surface) 60%)}
.domain-card.card-watch{border-color:var(--watch)}
.domain-card.card-strength{border-color:var(--strength)}

/* Card top row: name + score */
.dc-top{
  display:flex;justify-content:space-between;
  align-items:flex-start;margin-bottom:12px;
}
.dc-name{
  font-size:15px;font-weight:600;color:var(--text);
  letter-spacing:0.01em;line-height:1.3;
}
.dc-score{
  font-size:38px;font-weight:700;font-family:var(--font-mono);
  color:var(--text);line-height:1;
}

/* Badge row */
.dc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.dc-badges .badge{font-size:14px;padding:3px 10px}

/* Stat blocks — replaces tiny metric rows */
.dc-stats{
  display:flex;flex-direction:column;gap:0;
  margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.dc-stat-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 14px;border-bottom:1px solid var(--border);
  gap:12px;
}

function mean(arr){return arr.length===0?0:arr.reduce((a,b)=>a+b,0)/arr.length}
function stddev(arr){if(arr.length===0)return 0;const m=mean(arr);return Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/arr.length)}
function zScore(val,m,sd){return sd===0?0:(val-m)/sd}
function fmt(n,d=2){return isNaN(n)?'—':Number(n).toFixed(d)}

function getScore(student,domain,window){
  const key=`${domain}_${window}`;const v=student[key];
  return(v===undefined||v===null||isNaN(v))?null:Number(v);
}
function availableWindows(){
  return WINDOWS.filter(w=>students.some(s=>DOMAINS.some(d=>getScore(s,d,w)!==null)));
}
function computeStats(win){
  win=win||currentWindow;
  const cohortStats={};
  DOMAINS.forEach(d=>{
    const vals=students.map(s=>getScore(s,d,win)).filter(v=>v!==null);
    cohortStats[d]={mean:mean(vals),sd:stddev(vals),count:vals.length};
  });
  return students.map(s=>{
    const scores=DOMAINS.map(d=>getScore(s,d,win)).filter(v=>v!==null);
    const sMean=mean(scores);const sSd=stddev(scores);
    const result={name:s.Student};
    DOMAINS.forEach(d=>{
      const score=getScore(s,d,win);
      if(score===null){result[d]={score:null,cohortZ:null,bmZ:null,profileZ:null};return;}
      const cm=cohortStats[d].mean;const csd=cohortStats[d].sd;const bm=getBenchmark(d,win);
      result[d]={score,cohortZ:zScore(score,cm,csd),bmZ:zScore(score,bm,csd),profileZ:zScore(score,sMean,sSd)};
    });
    const validZs=DOMAINS.map(d=>result[d].cohortZ).filter(z=>z!==null);
    let minZ=validZs.length?Math.min(...validZs):0;
    let weakest=DOMAINS.find(d=>result[d].cohortZ===minZ)||'D1';
    result.weakest=weakest;result.minZ=minZ;result.isFlagged=minZ<-1.0;
    return result;
  });
}
function getBenchmark(domain,win){
  const bms=config.benchmarks[domain];
  if(!bms)return 75;
  if(typeof bms==='object'&&bms[win]!==undefined)return bms[win];
  if(typeof bms==='number')return bms;
  return 75;
}

// ============================================================
// HEATMAP — 2x2 tiered panels, chart default, expandable student list
// ============================================================
let heatmapExpanded = {critical:false, flagged:false, watch:false, typical:false};

function toggleHeatmapTier(tier){
  heatmapExpanded[tier] = !heatmapExpanded[tier];
  render();
}

function chipClass(score, domain, win){
  const allScores = students.map(s=>getScore(s,domain,win)).filter(v=>v!==null);
  if(!allScores.length) return 'typical';
  const sd = stddev(allScores);
  const m = mean(allScores);
  const z = sd===0?0:(score-m)/sd;
  if(z<-1.5) return 'critical';
  if(z<-1.0) return 'flagged';
  if(z<-0.5) return 'watch';
  if(z>=1.0)  return 'strength';
  return 'typical';
}

function renderHeatmap(){
  const data = computeStats();

  const tiers = {
    critical: data.filter(s=>s.minZ<-1.5).sort((a,b)=>a.minZ-b.minZ),
    flagged:  data.filter(s=>s.minZ>=-1.5&&s.minZ<-1.0).sort((a,b)=>a.minZ-b.minZ),
    watch:    data.filter(s=>s.minZ>=-1.0&&s.minZ<-0.5).sort((a,b)=>a.minZ-b.minZ),
    typical:  data.filter(s=>s.minZ>=-0.5).sort((a,b)=>b.minZ-a.minZ),
  };

  const tierConfig = [
    {key:'critical', label:'⚠ Critical',  desc:'z < −1.5', color:'critical'},
    {key:'flagged',  label:'▲ Flagged',   desc:'z < −1.0', color:'flagged'},
    {key:'watch',    label:'◆ Watch',     desc:'z < −0.5', color:'watch'},
    {key:'typical',  label:'✓ Typical',   desc:'z ≥ −0.5', color:'typical'},
  ];

  function buildChart(tierStudents, colorKey){
    if(!tierStudents.length) return`<div class="hm-empty">No students in this tier</div>`;
    const total = tierStudents.length;
    const isTypical = colorKey === 'typical';
    const bars = DOMAINS.map(d=>{
      const count = isTypical
        ? tierStudents.filter(s => s[d].cohortZ !== null && s[d].cohortZ >= 0).length
        : tierStudents.filter(s => s[d].cohortZ !== null && s[d].cohortZ < -0.5).length;
      const pct = total > 0 ? (count/total)*100 : 0;
      const name = config.domainNames[d];
      return`<div class="hm-bar-row">
        <div class="hm-bar-domain" title="${name}">${name}</div>
        <div class="hm-bar-outer">
          <div class="hm-bar-fill ${colorKey}" style="width:${pct}%"></div>
        </div>
        <div class="hm-bar-count">${count}/${total}</div>
      </div>`;
    }).join('');
    const label = isTypical
      ? `% at or above cohort average (z ≥ 0) per domain — ${total} student${total!==1?'s':''}`
      : `% struggling below threshold (z &lt; −0.5) per domain — ${total} student${total!==1?'s':''}`;
    return`<div class="hm-chart-body">
      <div class="hm-chart-title">${label}</div>
      ${bars}
    </div>`;
  }

  // Build student list for a tier
  function buildStudentList(tierStudents){
    if(!tierStudents.length) return'';
    const rows = tierStudents.map(s=>{
      const rawSt = students.find(st=>st.Student===s.name);
      const rawScores = DOMAINS.map(d=>getScore(rawSt,d,currentWindow)).filter(v=>v!==null);
      const total = rawScores.length ? rawScores.reduce((a,b)=>a+b,0) : null;
      const pmTracks = pmData[s.name]||[];
      const pmBadge = pmTracks.length ? `<span class="${pmTracks.some(t=>t.tier==3)?'tier-3-badge':'tier-2-badge'}" style="margin-left:4px">PM</span>` : '';

      const chips = DOMAINS.map(d=>{
        const sc = rawSt ? getScore(rawSt,d,currentWindow) : null;
        if(sc===null) return`<div class="hm-chip typical"><div class="hm-chip-lbl">${d}</div><div class="hm-chip-val">—</div></div>`;
        const cls = chipClass(sc,d,currentWindow);
        return`<div class="hm-chip ${cls}"><div class="hm-chip-lbl">${d}</div><div class="hm-chip-val">${sc}</div></div>`;
      }).join('');

      return`<div class="hm-srow" onclick="gotoStudent('${s.name}')">
        <div class="hm-srow-name">${s.name}${pmBadge}</div>
        <div class="hm-srow-weak">${config.domainNames[s.weakest]}</div>
        <div class="hm-srow-total">${total??'—'}</div>
        <div class="hm-srow-domains">${chips}</div>
      </div>`;
    }).join('');

    return`<div class="hm-student-list">
      <div class="hm-list-header">
        <div class="hm-list-th name">Student</div>
        <div class="hm-list-th weak">Weakest</div>
        <div class="hm-list-th total">Total</div>
        <div class="hm-list-th domains">Domain Scores</div>
      </div>
      ${rows}
    </div>`;
  }

  // Build each tier panel
  function buildPanel(tc){
    const ts = tiers[tc.key];
    const expanded = heatmapExpanded[tc.key];
    return`<div class="hm-tier-panel">
      <div class="hm-tier-panel-header ${tc.color}" onclick="toggleHeatmapTier('${tc.key}')">
        <div class="hm-tier-panel-title ${tc.color}">${tc.label}</div>
        <div class="hm-tier-panel-count">${ts.length} student${ts.length!==1?'s':''} · ${tc.desc}</div>
        <div class="hm-tier-panel-chevron ${expanded?'open':''}">▼</div>
      </div>
      ${expanded ? buildStudentList(ts) : buildChart(ts, tc.color)}
    </div>`;
  }

  const panels = tierConfig.map(buildPanel);

  return`<div>
    <div class="panel-header">
      <div class="panel-header-left">
        <div class="panel-title">Cohort Overview</div>
        <div class="panel-sub">click any tier to expand student list · click again to see domain distribution</div>
      </div>
      ${renderWindowToggle()}
    </div>
    <div class="metric-row">
      <div class="metric-card"><div class="metric-label">Total Students</div><div class="metric-value">${data.length}</div></div>
      <div class="metric-card"><div class="metric-label">Critical</div><div class="metric-value" style="color:var(--critical)">${tiers.critical.length}</div><div class="metric-sub">z &lt; −1.5</div></div>
      <div class="metric-card"><div class="metric-label">Flagged</div><div class="metric-value" style="color:var(--flagged)">${tiers.flagged.length}</div><div class="metric-sub">z &lt; −1.0</div></div>
      <div class="metric-card"><div class="metric-label">Watch</div><div class="metric-value" style="color:var(--watch)">${tiers.watch.length}</div><div class="metric-sub">z &lt; −0.5</div></div>
      <div class="metric-card"><div class="metric-label">Typical</div><div class="metric-value" style="color:var(--strength)">${tiers.typical.length}</div><div class="metric-sub">on track</div></div>
    </div>
    <div class="heatmap-grid">
      ${panels[0]}${panels[1]}
      ${panels[2]}${panels[3]}
    </div>
  </div>`;
}

// ============================================================
// GROWTH CHART — total raw score across windows
// ============================================================
// Chart colors — dramatic contrast, works across themes
const CHART_STUDENT = '#f59e0b'; // amber/orange
const CHART_IDEAL   = '#3b82f6'; // electric blue
const CHART_COHORT  = '#10b981'; // emerald green

function setProfileChartMode(mode){
  profileChartMode = mode;
  render();
}

function renderGrowthChart(studentRaw, studentName){
  const avail = availableWindows();
  const allWins = WINDOWS;

  const idealTotals = allWins.map(w =>
    DOMAINS.reduce((sum, d) => sum + getBenchmark(d, w), 0)
  );
  const cohortTotals = allWins.map(w => {
    const sums = students.map(s => {
      const sc = DOMAINS.map(d => getScore(s, d, w)).filter(v => v !== null);
      return sc.length === DOMAINS.length ? sc.reduce((a,b) => a+b, 0) : null;
    }).filter(v => v !== null);
    return sums.length ? mean(sums) : null;
  });
  const studentTotals = allWins.map(w => {
    if (!studentRaw) return null;
    const sc = DOMAINS.map(d => getScore(studentRaw, d, w)).filter(v => v !== null);
    return sc.length === DOMAINS.length ? sc.reduce((a,b) => a+b, 0) : null;
  });

  // Percent growth from first valid to last valid window
  function pctGrowth(totals){
    const valid = totals.map((v,i) => v!==null?{v,i}:null).filter(Boolean);
    if(valid.length < 2) return null;
    const first = valid[0], last = valid[valid.length-1];
    if(first.v === 0) return null;
    const pct = ((last.v - first.v) / first.v) * 100;
    return pct;
  }

  const studentPct = pctGrowth(studentTotals);
  const cohortPct  = pctGrowth(cohortTotals);
  const idealPct   = pctGrowth(idealTotals);

  function fmtPct(p){ if(p===null)return null; return (p>=0?'+':'')+p.toFixed(1)+'%'; }

  // SVG
  const W = 560, H = 200;
  const pad = {l: 52, r: 120, t: 20, b: 36}; // extra right padding for labels
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;

  const allVals = [...idealTotals, ...cohortTotals.filter(v=>v!==null), ...studentTotals.filter(v=>v!==null)];
  if(!allVals.length) return`<div class="growth-chart-wrap"><div class="hm-empty">Not enough data to show growth chart.</div></div>`;

  const rawMin = Math.min(...allVals);
  const rawMax = Math.max(...allVals);
  const ySpan = rawMax - rawMin || 20;
  const yMin = Math.max(0, rawMin - ySpan * 0.2);
  const yMax = rawMax + ySpan * 0.2;

  const xOf = i => pad.l + (i / (allWins.length - 1)) * chartW;
  const yOf = v => pad.t + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

  // Grid lines
  const gridLines = Array.from({length:5}, (_,i) => {
    const v = yMin + (yMax - yMin) * (i/4);
    const y = yOf(v);
    return `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2a4070" stroke-width="1"/>
      <text x="${pad.l-6}" y="${y+4}" font-size="14" fill="#6a8ab8" text-anchor="end">${Math.round(v)}</text>`;
  }).join('');

  const xLabels = allWins.map((w,i) => {
    const hasData = avail.includes(w);
    return `<text x="${xOf(i)}" y="${H-pad.b+18}" font-size="14" fill="${hasData?'#a8bcdc':'#3a5590'}" text-anchor="middle" font-family="IBM Plex Mono">${w}</text>`;
  }).join('');

  // Build path + dots + value labels with anti-overlap
  // We collect all label positions and stagger vertically if they're too close
  function buildLine(totals, stroke, strokeWidth, dasharray){
    const pts = totals.map((v,i) => v!==null ? {x:xOf(i), y:yOf(v), v, i} : null).filter(Boolean);
    if(!pts.length) return {svg:'', labelPts:[]};

    const segments = [];
    let cur = [];
    totals.forEach((v,i) => {
      const p = v!==null ? {x:xOf(i), y:yOf(v), v, i} : null;
      if(p){ cur.push(p); }
      else { if(cur.length){ segments.push(cur); cur=[]; } }
    });
    if(cur.length) segments.push(cur);

    const polylines = segments.map(seg =>
      seg.length>1 ? `<polyline points="${seg.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="${stroke}" stroke-width="${strokeWidth}" stroke-dasharray="${dasharray}" opacity="0.9"/>` : ''
    ).join('');

    const dots = pts.map(p =>
      `<circle cx="${p.x}" cy="${p.y}" r="5" fill="${stroke}" stroke="var(--surface)" stroke-width="2"/>`
    ).join('');

    return {svg: polylines+dots, labelPts: pts.map(p=>({...p, stroke}))};
  }

  const studentLine = buildLine(studentTotals, CHART_STUDENT, 2.5, 'none');
  const idealLine   = buildLine(idealTotals,   CHART_IDEAL,   1.5, '6,3');
  const cohortLine  = buildLine(cohortTotals,  CHART_COHORT,  1.5, '3,3');

  // Per-point labels: for each x column, rank lines top→bottom,
  // top line labels ABOVE, middle ON (with text-shadow outline), bottom BELOW
  const allLabelPts = [
    ...studentLine.labelPts,
    ...idealLine.labelPts,
    ...cohortLine.labelPts
  ];

  // Group by x column
  const labelsByX = {};
  allLabelPts.forEach(p => {
    const key = Math.round(p.x);
    if(!labelsByX[key]) labelsByX[key] = [];
    labelsByX[key].push(p);
  });

  const labelSVG = Object.values(labelsByX).map(group => {
    // Sort top to bottom (lowest y = highest on screen)
    group.sort((a,b) => a.y - b.y);
    const n = group.length;
    return group.map((p, i) => {
      let dy, anchor;
      if(n === 1){
        dy = -13; anchor = 'middle';
      } else if(i === 0){
        // topmost line → label above
        dy = -13; anchor = 'middle';
      } else if(i === n-1){
        // bottommost line → label below
        dy = 18; anchor = 'middle';
      } else {
        // middle → on the line, use paint-order stroke for outline
        dy = 4; anchor = 'middle';
      }
      const isMiddle = n > 1 && i > 0 && i < n-1;
      if(isMiddle){
        // Outlined text for middle line readability
        return `<text x="${p.x}" y="${p.y + dy}" font-size="14" fill="${p.stroke}"
          text-anchor="${anchor}" font-family="IBM Plex Mono" font-weight="700"
          paint-order="stroke" stroke="var(--surface)" stroke-width="3" stroke-linejoin="round"
          >${Math.round(p.v)}</text>`;
      }
      return `<text x="${p.x}" y="${p.y + dy}" font-size="14" fill="${p.stroke}"
        text-anchor="${anchor}" font-family="IBM Plex Mono" font-weight="700"
        >${Math.round(p.v)}</text>`;
    }).join('');
  }).join('');

  // Right-side rate labels with connector lines to line endpoints
  // Get last valid point for each line
  function lastPt(totals){
    const valid = totals.map((v,i)=>v!==null?{v,i}:null).filter(Boolean);
    return valid.length ? valid[valid.length-1] : null;
  }
  const endItems = [
    {totals:studentTotals, stroke:CHART_STUDENT, label:'Student', pct:studentPct},
    {totals:idealTotals,   stroke:CHART_IDEAL,   label:'Ideal',   pct:idealPct},
    {totals:cohortTotals,  stroke:CHART_COHORT,  label:'Class',   pct:cohortPct},
  ].map(e => {
    const lp = lastPt(e.totals);
    if(!lp) return null;
    return {...e, lineEndX: xOf(lp.i), lineEndY: yOf(lp.v)};
  }).filter(Boolean);

  // Sort by actual y position (top to bottom)
  endItems.sort((a,b) => a.lineEndY - b.lineEndY);

  // Assign label y positions — start from actual positions but enforce min gap
  const labelGap = 22;
  const labelX = W - pad.r + 14;
  const connectorX = W - pad.r + 6;

  endItems.forEach(e => { e.labelY = e.lineEndY; });
  // Push down overlaps
  for(let i=1;i<endItems.length;i++){
    if(endItems[i].labelY - endItems[i-1].labelY < labelGap){
      endItems[i].labelY = endItems[i-1].labelY + labelGap;
    }
  }

  const endLabels = endItems.map(e => {
    const pctStr = e.pct !== null ? `  ${fmtPct(e.pct)}` : '';
    // Connector: short line from line endpoint to label
    const connector = `<line x1="${e.lineEndX+6}" y1="${e.lineEndY}" x2="${connectorX}" y2="${e.labelY}" stroke="${e.stroke}" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>`;
    const label = `<text x="${labelX}" y="${e.labelY+4}" font-size="14" fill="${e.stroke}" font-family="IBM Plex Mono" font-weight="700">${e.label}${pctStr}</text>`;
    return connector + label;
  }).join('');

  // Status note
  const lastAvailIdx = [...allWins].reverse().findIndex(w => avail.includes(w));
  const lastWinIdx = lastAvailIdx >= 0 ? allWins.length - 1 - lastAvailIdx : -1;
  let statusNote = '';
  if(lastWinIdx >= 0 && studentTotals[lastWinIdx] !== null){
    const gap = Math.round(studentTotals[lastWinIdx] - idealTotals[lastWinIdx]);
    statusNote = gap >= 0
      ? `<span style="color:${CHART_STUDENT};font-weight:600">+${gap} above ideal</span>`
      : `<span style="color:var(--critical);font-weight:600">${gap} below ideal</span>`;
  }

  return `<div class="growth-chart-wrap">
    <div class="growth-chart-title">Total Score Growth</div>
    <div class="growth-chart-sub">sum of all domain raw scores · BOY → MOY → EOY ${statusNote ? '· '+statusNote : ''}</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;overflow:visible">
      ${gridLines}
      ${xLabels}
      ${idealLine.svg}
      ${cohortLine.svg}
      ${studentLine.svg}
      ${labelSVG}
      ${endLabels}
    </svg>
    <div class="growth-chart-legend">
      <div class="growth-chart-legend-item">
        <div class="growth-chart-legend-line" style="background:${CHART_STUDENT};height:3px"></div>
        <span>This student${studentPct!==null?' · <strong style="color:'+CHART_STUDENT+'">'+fmtPct(studentPct)+' total growth</strong>':''}</span>
      </div>
      <div class="growth-chart-legend-item">
        <div class="growth-chart-legend-line" style="background:${CHART_IDEAL};border-top:2px dashed ${CHART_IDEAL};height:0;margin-top:1px"></div>
        <span>Benchmark ideal${idealPct!==null?' · <strong style="color:'+CHART_IDEAL+'">'+fmtPct(idealPct)+'</strong>':''}</span>
      </div>
      <div class="growth-chart-legend-item">
        <div class="growth-chart-legend-line" style="background:${CHART_COHORT};border-top:2px dotted ${CHART_COHORT};height:0;margin-top:1px"></div>
        <span>Class average${cohortPct!==null?' · <strong style="color:'+CHART_COHORT+'">'+fmtPct(cohortPct)+'</strong>':''}</span>
      </div>
    </div>
  </div>`;
}

// Inline PM summary for profile view — full case management
function trackStatus(t){
  const pts = t.points||[];
  const last = pts[pts.length-1];
  if(!last) return {code:'no_data', label:'No Data Yet', color:'var(--text3)'};

  const goalReached = t.goal && last.score >= t.goal;
  if(goalReached) return {code:'goal_reached', label:'🎉 Goal Reached!', color:'var(--strength)'};

  const goalDatePassed = t.goalDate && new Date() > new Date(t.goalDate);
  if(goalDatePassed) return {code:'goal_not_met', label:'⚠ Goal Not Met', color:'var(--flagged)'};

  const onAimLine = isOnTrack(t, last.date, last.score);
  if(onAimLine === null) return {code:'no_data', label:'No Data Yet', color:'var(--text3)'};
  if(onAimLine) return {code:'on_track', label:'✓ On Track', color:'var(--strength)'};
  return {code:'needs_attention', label:'↓ Needs Attention', color:'var(--critical)'};
}

function renderProfilePMView(studentName){
  const tracks = pmData[studentName]||[];
  if(!tracks.length){
    return`<div class="growth-chart-wrap">
      <div class="growth-chart-title" style="font-size:16px">Progress Monitoring</div>
      <div style="padding:24px;text-align:center;color:var(--text3);font-size:14px">
        No progress monitoring tracks yet for this student.<br>
        <button class="btn btn-primary" style="margin-top:14px" onclick="gotoPM('${studentName}')">Set Up Progress Monitoring →</button>
      </div>
    </div>`;
  }

  const trackCards = tracks.map(t=>{
    const pts = t.points||[];
    const last = pts[pts.length-1];
    const status = trackStatus(t);
    const pctGoal = t.goal && t.baseline!==undefined && last && (t.goal - t.baseline) !== 0
      ? Math.round((last.score - t.baseline) / (t.goal - t.baseline) * 100)
      : null;
    const gain = last && t.baseline!==undefined ? last.score - t.baseline : null;

    // Status-specific discussion prompt
    let discussionHTML = '';
    if(status.code === 'goal_reached'){
      discussionHTML = `<div style="background:var(--strength-bg);border:1px solid var(--strength);border-radius:8px;padding:16px;margin-top:14px">
        <div style="font-size:16px;font-weight:700;color:var(--strength-light);margin-bottom:10px">🎉 Goal Reached! Time to celebrate and plan next steps.</div>
        <div style="font-size:14px;color:var(--strength-light);margin-bottom:8px;font-weight:600">Discussion questions for your team:</div>
        <div style="font-size:14px;color:var(--text2);display:flex;flex-direction:column;gap:8px">
          <div>→ <strong>Dismissal from intervention?</strong> Has the student demonstrated enough consistency to exit Tier 2/3 support?</div>
          <div>→ <strong>Tier 1 transition plan:</strong> What classroom supports can the teacher put in place to maintain progress without direct intervention?</div>
          <div>→ <strong>Monitor in core:</strong> Set a check-in date to verify skills are holding in the general education setting.</div>
        </div>
      </div>`;
    } else if(status.code === 'goal_not_met'){
      const totalDays = t.goalDate && t.startDate ? Math.round((new Date(t.goalDate)-new Date(t.startDate))/86400000) : null;
      discussionHTML = `<div style="background:var(--flagged-bg);border:1px solid var(--flagged);border-radius:8px;padding:16px;margin-top:14px">
        <div style="font-size:16px;font-weight:700;color:var(--flagged-light);margin-bottom:10px">⚠ Goal period ended — team review needed.</div>
        <div style="font-size:14px;color:var(--flagged-light);margin-bottom:8px;font-weight:600">Progress made: ${gain!==null?`+${gain} points (${pctGoal??'—'}% of goal)`:'—'}</div>
        <div style="font-size:14px;color:var(--text2);display:flex;flex-direction:column;gap:8px">
          <div>→ <strong>Continue with revised goal?</strong> Extend the timeline if meaningful progress was made.</div>
          <div>→ <strong>Right skill, right intervention?</strong> Re-evaluate whether the targeted skill matches the root cause of the deficit.</div>
          <div>→ <strong>Increase intensity?</strong> Consider moving to a more intensive intervention or increasing frequency.</div>
          <div>→ <strong>Refer for evaluation?</strong> If multiple cycles show insufficient response, consider a special education referral.</div>
        </div>
      </div>`;
    } else if(status.code === 'needs_attention'){
      discussionHTML = `<div style="background:var(--critical-bg);border:1px solid var(--critical);border-radius:8px;padding:14px;margin-top:14px">
        <div style="font-size:15px;font-weight:700;color:var(--critical-light);margin-bottom:8px">↓ Falling below aim line — check in now.</div>
        <div style="font-size:14px;color:var(--text2);display:flex;flex-direction:column;gap:6px">
          <div>→ Is the student attending intervention consistently?</div>
          <div>→ Is the intervention being delivered with fidelity?</div>
          <div>→ Are there external factors (attendance, behavior, health) affecting performance?</div>
        </div>
      </div>`;
    }

    // Recent data points
    const recentPts = pts.slice(-5).map(p=>{
      const onT = isOnTrack(t, p.date, p.score);
      const dot = onT===null?'●':onT?'<span style="color:var(--strength)">●</span>':'<span style="color:var(--critical)">●</span>';
      return`<tr>
        <td class="center" style="font-size:14px">${dot}</td>
        <td style="font-size:14px">${p.date}</td>
        <td class="center" style="font-size:16px;font-weight:600;font-family:var(--font-mono)">${p.score}</td>
      </tr>`;
    }).join('');

    return`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <div style="font-size:17px;font-weight:700;color:var(--text);flex:1">${t.name}</div>
        <span class="${t.tier==3?'tier-3-badge':'tier-2-badge'}" style="font-size:14px;padding:3px 10px">Tier ${t.tier}</span>
        <span style="font-size:15px;font-weight:700;color:${status.color}">${status.label}</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px">
        <div style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:10px 12px">
          <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Baseline</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:var(--text)">${t.baseline??'—'}</div>
        </div>
        <div style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:10px 12px">
          <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Current</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:var(--text)">${last?last.score:'—'}</div>
        </div>
        <div style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:10px 12px">
          <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Goal</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:var(--text)">${t.goal??'—'}</div>
          <div style="font-size:14px;color:var(--text3);margin-top:2px">by ${t.goalDate||'—'}</div>
        </div>
        <div style="background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:10px 12px">
          <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Progress</div>
          <div style="font-size:20px;font-weight:700;font-family:var(--font-mono);color:${status.color}">${pctGoal!==null?pctGoal+'%':'—'}</div>
          <div style="font-size:14px;color:var(--text3);margin-top:2px">${gain!==null?(gain>=0?'+':'')+gain+' pts':'—'}</div>
        </div>
      </div>

      ${t.notes?`<div style="font-size:14px;color:var(--text2);background:var(--surface3);border-left:3px solid var(--border2);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:14px"><strong style="color:var(--text)">Notes:</strong> ${t.notes}</div>`:''}

      ${recentPts?`<div style="margin-bottom:12px">
        <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">Recent Probes</div>
        <div class="table-wrap"><table>
          <thead><tr><th class="center" style="font-size:14px">Status</th><th style="font-size:14px">Date</th><th class="center" style="font-size:14px">Score</th></tr></thead>
          <tbody>${recentPts}</tbody>
        </table></div>
      </div>`:''}

      ${discussionHTML}
    </div>`;
  }).join('');

  return`<div class="growth-chart-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="growth-chart-title" style="font-size:16px">Progress Monitoring — ${studentName}</div>
      <button class="btn btn-sm" onclick="gotoPM('${studentName}')">Manage Tracks →</button>
    </div>
    <div class="growth-chart-sub">${tracks.length} track${tracks.length!==1?'s':''}</div>
    ${trackCards}
  </div>`;
}

// ============================================================
// INDIVIDUAL PROFILE — REFACTORED
// ============================================================
function renderProfile(){
  const data=computeStats();
  const sorted=[...data].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  if(selectedStudent>=sorted.length)selectedStudent=0;
  const s=sorted[selectedStudent];
  const studentRaw=students.find(st=>st.Student===s.name);

  const options=sorted.map((st,i)=>
    `<option value="${i}" ${i===selectedStudent?'selected':''}>${st.name}</option>`).join('');

  const flaggedDomains=DOMAINS.filter(d=>s[d].cohortZ!==null&&s[d].cohortZ<-1.0).map(d=>config.domainNames[d]);
  const strengthDomains=DOMAINS.filter(d=>s[d].profileZ!==null&&s[d].profileZ>=0.5).map(d=>config.domainNames[d]);
  const pmTracks=pmData[s.name]||[];

  // Score overview tiles
  const allScores=DOMAINS.map(d=>s[d].score).filter(v=>v!==null);
  const avgScore=allScores.length?Math.round(mean(allScores)):null;
  const scoreTiles=`
    <div class="profile-score-tile">
      <div class="profile-score-tile-label">Avg Score</div>
      <div class="profile-score-tile-val">${avgScore??'—'}</div>
      <div class="profile-score-tile-sub">${currentWindow} window</div>
    </div>
    <div class="profile-score-tile">
      <div class="profile-score-tile-label">Weakest Domain</div>
      <div class="profile-score-tile-val" style="font-size:20px;padding-top:4px">${config.domainNames[s.weakest]}</div>
      <div class="profile-score-tile-sub">z = ${fmt(s.minZ,2)}</div>
    </div>
    <div class="profile-score-tile">
      <div class="profile-score-tile-label">Domains Flagged</div>
      <div class="profile-score-tile-val" style="color:${flaggedDomains.length?'var(--flagged)':'var(--strength)'}">${flaggedDomains.length}</div>
      <div class="profile-score-tile-sub">cohort z &lt; −1.0</div>
    </div>
    <div class="profile-score-tile">
      <div class="profile-score-tile-label">Strengths</div>
      <div class="profile-score-tile-val" style="color:var(--strength)">${strengthDomains.length}</div>
      <div class="profile-score-tile-sub">within-profile z &gt; 0.5</div>
    </div>
  `;

  // Build domain cards
  const avail=availableWindows();
  // Pre-compute cohort averages per domain for current window
  const cohortAvgs={};
  DOMAINS.forEach(d=>{
    const vals=students.map(s=>getScore(s,d,currentWindow)).filter(v=>v!==null);
    cohortAvgs[d]=vals.length?Math.round(mean(vals)):null;
  });

  const domainCards=DOMAINS.map(d=>{
    const info=s[d];
    if(info.score===null){
      return`<div class="domain-card">
        <div class="dc-top"><div class="dc-name">${config.domainNames[d]}</div><div style="font-size:14px;color:var(--text3)">No data for ${currentWindow}</div></div>
      </div>`;
    }

    const bm=getBenchmark(d,currentWindow);
    const cohortAvg=cohortAvgs[d];
    const score=info.score;

    // Flat comparisons
    const vsBm=score-bm;
    const vsBmPct=Math.round((score/bm)*100);
    const vsCohort=cohortAvg!==null?score-cohortAvg:null;

    // vs benchmark pill
    const bmPillClass=vsBm>=0?'above':Math.abs(vsBm)<=5?'near':'below';
    const bmPillText=vsBm>=0?`+${vsBm} above`:`${vsBm} below`;

    // vs cohort pill
    let cohortPillHTML='';
    if(vsCohort!==null){
      const cpClass=vsCohort>=0?'above':Math.abs(vsCohort)<=3?'near':'below';
      const cpText=vsCohort>=0?`+${Math.round(vsCohort)} above`:`${Math.round(vsCohort)} below`;
      cohortPillHTML=`<span class="dc-stat-pill ${cpClass}">${cpText}</span>`;
    }

    // within-profile plain language
    const pz=info.profileZ;
    const pLabel=pz>=0.5?'Personal strength':(pz<=-0.5?'Personal weakness':'Typical for this student');
    const pClass=pz>=0.5?'badge-strength':(pz<=-0.5?'badge-flagged':'badge-typical');
    const cc=cardClass(info.cohortZ);

    // Timeline
    let timelineHTML='';
    if(avail.length>1 && studentRaw){
      const segs=[];
      avail.forEach(w=>{const sc=getScore(studentRaw,d,w);if(sc!==null)segs.push({w,sc});});
      if(segs.length>1){
        const parts=segs.map((seg,i)=>{
          let arrow='';
          if(i>0){
            const delta=seg.sc-segs[i-1].sc;
            const dir=delta>0?'up':delta<0?'down':'';
            const sym=delta>0?'↑':delta<0?'↓':'→';
            arrow=`<div class="dc-tl-arrow ${dir}">${sym}<div class="dc-tl-delta ${delta>0?'pos':delta<0?'neg':''}">${delta>0?'+':''}${delta}</div></div>`;
          }
          return`${arrow}<div class="dc-tl-win">
            <div class="dc-tl-label">${seg.w}</div>
            <div class="dc-tl-score" style="color:${seg.w===currentWindow?'var(--text)':'var(--text3)'}">${seg.sc}</div>
          </div>`;
        }).join('');
        timelineHTML=`<div class="dc-timeline">${parts}</div>`;
      }
    }

    // Progress bar pct — cap display at 110% so bar doesn't go crazy
    const bmFillPct = Math.min((score/bm)*100, 110);
    const bmExceeded = score >= bm;
    const bmFillClass = score>=bm?'above': Math.abs(vsBm)<=5?'near':'below';

    const cohortFillPct = cohortAvg ? Math.min((score/cohortAvg)*100, 110) : 0;
    const cohortExceeded = cohortAvg !== null && score >= cohortAvg;
    const cohortFillClass = vsCohort!==null?(vsCohort>=0?'above':Math.abs(vsCohort)<=3?'near':'below'):'below';

    // Z-scores for footer
    const cZ = info.cohortZ!==null ? fmt(info.cohortZ,2) : '—';
    const bZ = info.bmZ!==null ? fmt(info.bmZ,2) : '—';
    const pZ = info.profileZ!==null ? fmt(info.profileZ,2) : '—';

    return`<div class="domain-card ${cc}">
      <div class="dc-top">
        <div class="dc-name">${config.domainNames[d]}</div>
        <div class="dc-score">${score}</div>
      </div>
      <div class="dc-badges">
        <span class="badge ${pClass}">${pLabel}</span>
      </div>
      <div class="dc-progress-stats">
        <div class="dc-progress-row">
          <div class="dc-progress-header">
            <span class="dc-progress-label">vs Benchmark (${bm})</span>
            <span class="dc-progress-val">
              ${vsBmPct}%
              ${bmExceeded?`<span class="star-badge" title="Exceeds benchmark!">✦</span>`:''}
            </span>
          </div>
          <div class="dc-progress-track">
            <div class="dc-progress-fill ${bmFillClass}" style="width:${Math.min(bmFillPct,100)}%"></div>
          </div>
          <div class="dc-progress-sub">${score} / ${bm} · ${vsBm>=0?'+'+vsBm:vsBm} points</div>
        </div>
        <div class="dc-progress-row">
          <div class="dc-progress-header">
            <span class="dc-progress-label">vs Class Avg${cohortAvg!==null?' ('+cohortAvg+')':''}</span>
            <span class="dc-progress-val">
              ${cohortAvg!==null?Math.round((score/cohortAvg)*100)+'%':'—'}
              ${cohortExceeded?`<span class="star-badge" title="Above class average!">✦</span>`:''}
            </span>
          </div>
          ${cohortAvg!==null?`<div class="dc-progress-track">
            <div class="dc-progress-fill ${cohortFillClass}" style="width:${Math.min(cohortFillPct,100)}%"></div>
          </div>
          <div class="dc-progress-sub">${score} / ${cohortAvg} · ${vsCohort!==null?(Math.round(vsCohort)>=0?'+'+Math.round(vsCohort):Math.round(vsCohort)):''} points</div>`:''}
        </div>
      </div>
      <div class="dc-footer">
        ${timelineHTML ? `<div>${timelineHTML}</div>` : '<div></div>'}
        <div class="dc-zscore-block">
          <div class="dc-zscore-label">z-scores</div>
          <div class="dc-zscore-vals">
            <div class="dc-zscore-item"><div class="dc-zscore-item-label">cohort</div><div class="dc-zscore-item-val" style="color:${info.cohortZ!==null&&info.cohortZ<-1.0?'var(--critical-light)':info.cohortZ!==null&&info.cohortZ>=1.0?'var(--strength-light)':'var(--text3)'}">${cZ}</div></div>
            <div class="dc-zscore-item"><div class="dc-zscore-item-label">benchmark</div><div class="dc-zscore-item-val" style="color:${info.bmZ!==null&&info.bmZ<-1.0?'var(--critical-light)':info.bmZ!==null&&info.bmZ>=0?'var(--strength-light)':'var(--text3)'}">${bZ}</div></div>
            <div class="dc-zscore-item"><div class="dc-zscore-item-label">profile</div><div class="dc-zscore-item-val">${pZ}</div></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Raw score bar chart
  const maxScore=100;
  const barRows=DOMAINS.map(d=>{
    const score=s[d].score;
    if(score===null)return`<div class="domain-bar-row"><div class="domain-bar-label">${d}</div><div class="domain-bar-outer"></div><div class="domain-bar-val">—</div></div>`;
    const bm=getBenchmark(d,currentWindow);
    const pct=score/maxScore*100;
    const bmPct=bm/maxScore*100;
    const z=s[d].cohortZ||0;
    const barClr=z<-1.5?'var(--critical)':z<-1.0?'var(--flagged)':z<-0.5?'var(--watch)':z>=1.0?'var(--strength)':'var(--slate2)';
    return`<div class="domain-bar-row">
      <div class="domain-bar-label">${d}</div>
      <div class="domain-bar-outer">
        <div class="domain-bar-student" style="width:${pct}%;background:${barClr}"></div>
        <div class="domain-bar-bm" style="left:${bmPct}%"></div>
      </div>
      <div class="domain-bar-val">${score}</div>
    </div>`;
  }).join('');

  return`<div>
    <div class="profile-select-wrap">
      <label>Student:</label>
      <select id="student-select" onchange="selectedStudent=parseInt(this.value);profileChartMode='benchmark';render()">${options}</select>
      <div class="profile-name" style="margin-left:4px">${s.name}</div>
      ${flaggedDomains.length?`<span class="badge badge-flagged">${flaggedDomains.length} domain${flaggedDomains.length>1?'s':''} flagged</span>`:''}
      ${pmTracks.length?`<span class="tier-${pmTracks.some(t=>t.tier==3)?'3':'2'}-badge">PM Tier ${pmTracks.some(t=>t.tier==3)?'3':'2'}</span>`:''}
      <button class="btn btn-sm" style="margin-left:auto" onclick="setProfileChartMode(profileChartMode==='pm'?'benchmark':'pm')">${profileChartMode==='pm'?'← Benchmark Growth':'Progress Monitoring'}</button>
      ${renderWindowToggle(false)}
    </div>

    <div class="profile-score-bar">${scoreTiles}</div>

    ${profileChartMode==='pm' ? renderProfilePMView(s.name) : renderGrowthChart(studentRaw, s.name)}

    ${strengthDomains.length?`<div class="callout callout-success"><strong>Relative strengths to leverage:</strong> ${strengthDomains.join(', ')}</div>`:''}
    ${flaggedDomains.length?`<div class="callout callout-warning"><strong>Domains needing support:</strong> ${flaggedDomains.join(', ')} — below cohort z −1.0</div>`:''}

    <div class="profile-grid">${domainCards}</div>

    <div class="profile-bar-section">
      <div class="profile-bar-section-label">Raw Score vs Benchmark — ${currentWindow} <span style="color:#4a9ee0;font-size:14px">│ blue line = benchmark</span></div>
      ${barRows}
    </div>
  </div>`;
}

// ============================================================
// PRIORITY LIST
// ============================================================
function renderPriority(){
  const data=computeStats();
  const flagged=data.filter(s=>s.isFlagged).sort((a,b)=>a.minZ-b.minZ);
  const domainHeaders=DOMAINS.map(d=>`<th class="center">${config.domainNames[d]}<br><span style="font-weight:400;color:var(--text3);font-size:14px">Cohort Z</span></th>`).join('');
  const bmHeaders=DOMAINS.map(d=>`<th class="center">${config.domainNames[d]}<br><span style="font-weight:400;color:var(--text3);font-size:14px">BM Z</span></th>`).join('');
  const rows=flagged.map((s,i)=>{
    const cCols=DOMAINS.map(d=>{const z=s[d].cohortZ;if(z===null)return`<td class="z-cell z-typical">—</td>`;return`<td class="z-cell ${zCellClass(z)}">${fmt(z,2)}</td>`;}).join('');
    const bCols=DOMAINS.map(d=>{const z=s[d].bmZ;if(z===null)return`<td class="z-cell z-typical">—</td>`;return`<td class="z-cell ${zCellClass(z)}">${fmt(z,2)}</td>`;}).join('');
    const wLabel=cohortStatusLabel(s.minZ);
    const pmTracks=pmData[s.name]||[];
    const pmBadge=pmTracks.length?`<span class="${pmTracks.some(t=>t.tier==3)?'tier-3-badge':'tier-2-badge'}" style="margin-left:4px">PM T${pmTracks.some(t=>t.tier==3)?'3':'2'}</span>`:'';
    return`<tr>
      <td class="center"><span class="rank-badge">${i+1}</span></td>
      <td class="name" style="cursor:pointer" onclick="gotoStudent('${s.name}')"><span style="color:#4a9ee0">${s.name}</span>${pmBadge}</td>
      <td class="mono center">${config.domainNames[s.weakest]}</td>
      <td class="center"><span class="badge ${statusClass(wLabel)}">${fmt(s.minZ,2)}</span></td>
      ${cCols}${bCols}
    </tr>`;
  }).join('');
  return`<div>
    <div class="panel-header">
      <div class="panel-header-left"><div class="panel-title">Priority List</div><div class="panel-sub">students flagged on any domain · cohort z &lt; −1.0 · sorted by severity</div></div>
      ${renderWindowToggle()}
    </div>
    <div class="metric-row">
      <div class="metric-card"><div class="metric-label">Flagged Students</div><div class="metric-value" style="color:var(--flagged)">${flagged.length}</div><div class="metric-sub">of ${data.length} total</div></div>
      <div class="metric-card"><div class="metric-label">Critical Priority</div><div class="metric-value" style="color:var(--critical)">${flagged.filter(s=>s.minZ<-1.5).length}</div><div class="metric-sub">z &lt; −1.5</div></div>
      <div class="metric-card"><div class="metric-label">Multi-domain flags</div><div class="metric-value">${flagged.filter(s=>DOMAINS.filter(d=>s[d].cohortZ!==null&&s[d].cohortZ<-1.0).length>1).length}</div></div>
      <div class="metric-card"><div class="metric-label">On PM</div><div class="metric-value" style="color:#a0a0f4">${flagged.filter(s=>(pmData[s.name]||[]).length>0).length}</div></div>
    </div>
    <div class="callout">Click a student name to view their full individual profile.</div>

function renderDomain(){
  const avail=availableWindows();
  const domainCards=DOMAINS.map(d=>{
    const bm=getBenchmark(d,currentWindow);
    const allScores=students.map(s=>getScore(s,d,currentWindow)).filter(v=>v!==null);
    if(!allScores.length)return`<div class="tier-card"><div class="tier-card-head"><div class="tier-title">${config.domainNames[d]}</div></div><p style="font-size:14px;color:var(--text3)">No data for ${currentWindow}</p></div>`;
    const cohortAvg=mean(allScores);const belowBM=allScores.filter(s=>s<bm);
    const pctBelow=belowBM.length/allScores.length;const isConcern=pctBelow>0.2;
    const avgBelowScore=belowBM.length?mean(belowBM):0;
    const csd=stddev(allScores);const avgBmZ=belowBM.length?mean(belowBM.map(sc=>zScore(sc,bm,csd))):0;
    const fillColor=isConcern?'var(--flagged)':'var(--strength)';
    let winCompare='';
    if(avail.length>1){
      const cp=avail.map(w=>{
        const wScores=students.map(s=>getScore(s,d,w)).filter(v=>v!==null);
        if(!wScores.length)return'';
        return`<div class="win-compare-item"><div class="win-compare-label">${w}</div><div class="win-compare-val" style="color:${w===currentWindow?'var(--text)':'var(--text2)'}">${mean(wScores).toFixed(1)}</div></div>`;
      }).filter(Boolean).join('');
      winCompare=`<div style="margin-top:10px"><div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);margin-bottom:6px">COHORT AVG BY WINDOW</div><div class="win-compare">${cp}</div></div>`;
    }
    return`<div class="tier-card ${isConcern?'concern':''}">
      <div class="tier-card-head"><div class="tier-title">${config.domainNames[d]}</div><div class="${isConcern?'tier-concern-badge':'tier-ok-badge'}">${isConcern?'Review Tier 1':'Tier 1 OK'}</div></div>
      <div class="tier-stats">
        <div class="tier-stat"><div class="tier-stat-val" style="color:${isConcern?'var(--flagged)':'var(--strength)'}">${Math.round(pctBelow*100)}%</div><div class="tier-stat-label">below benchmark</div></div>
        <div class="tier-stat"><div class="tier-stat-val">${fmt(cohortAvg,1)}</div><div class="tier-stat-label">cohort avg</div></div>
        <div class="tier-stat"><div class="tier-stat-val">${bm}</div><div class="tier-stat-label">benchmark (${currentWindow})</div></div>
      </div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:4px;font-family:var(--font-mono)">% below benchmark</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctBelow*100}%;background:${fillColor}"></div></div>
      <div style="font-size:14px;color:var(--text3);margin-top:8px;font-family:var(--font-mono)">${belowBM.length} students below · avg score: ${fmt(avgBelowScore,1)} · avg BM z: ${fmt(avgBmZ,2)}</div>
      ${winCompare}
    </div>`;
  }).join('');
  return`<div>
    <div class="panel-header">
      <div class="panel-header-left"><div class="panel-title">Domain Summary — Tier 1 Analysis</div><div class="panel-sub">benchmark-based analysis · &gt;20% below = examine Tier 1 quality and fidelity</div></div>
      ${renderWindowToggle()}
    </div>
    <div class="callout"><strong>Why benchmark-based?</strong> Comparing students to each other always puts ~50% below average by definition. The <strong>80% rule:</strong> if more than 20% of a grade is below benchmark on a domain, examine curriculum, pacing, and fidelity before adding individual interventions.</div>
    <div class="domain-summary-grid">${domainCards}</div>
  </div>`;
}

function isOnTrack(track,dateStr,score){
  if(!track.goalDate||track.baseline===undefined||!track.goal)return null;
  const start=new Date(track.startDate||track.points[0]?.date||dateStr);
  const goal=new Date(track.goalDate);const current=new Date(dateStr);
  const totalDays=(goal-start)/86400000;const elapsed=(current-start)/86400000;
  if(totalDays<=0||elapsed<0)return null;
  const expected=track.baseline+(track.goal-track.baseline)*(elapsed/totalDays);
  return score>=expected;
}
function linReg(points){
  if(points.length<2)return null;
  const xs=points.map((_,i)=>i);const ys=points.map(p=>p.score);
  const mx=mean(xs),my=mean(ys);
  const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den=xs.reduce((s,x)=>s+(x-mx)**2,0);
  if(den===0)return null;
  const slope=num/den;return{slope,intercept:my-slope*mx};
}
function renderPMTrack(track){
  const pts=track.points||[];const reg=linReg(pts);
  const W=500,H=140,pad={l:36,r:16,t:12,b:24};
  let chartHTML='';
  if(pts.length>0){
    const scores=pts.map(p=>p.score);
    const minS=Math.min(...scores,track.baseline||0,track.goal||0)-5;
    const maxS=Math.max(...scores,track.baseline||0,track.goal||0)+5;
    const sx=i=>pad.l+(W-pad.l-pad.r)*(i/(Math.max(pts.length,2)-1||1));
    const sy=v=>pad.t+(H-pad.t-pad.b)*(1-(v-minS)/(maxS-minS));
    const gridLines=[0,0.25,0.5,0.75,1].map(f=>{
      const y=pad.t+f*(H-pad.t-pad.b);const v=Math.round(maxS-f*(maxS-minS));
      return`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#2a4070" stroke-width="1"/><text x="${pad.l-4}" y="${y+4}" font-size="14" fill="#6a8ab8" text-anchor="end">${v}</text>`;
    }).join('');
    let aimLine='';
    if(track.goal&&track.baseline!==undefined){
      const n=pts.length-1||1;
      aimLine=`<line x1="${sx(0)}" y1="${sy(track.baseline)}" x2="${sx(n)}" y2="${sy(track.goal)}" stroke="#4a9ee0" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>`;
    }
    let trendLine='';
    if(reg&&pts.length>=2){
      const n=pts.length-1;
      trendLine=`<line x1="${sx(0)}" y1="${sy(reg.intercept)}" x2="${sx(n)}" y2="${sy(reg.slope*n+reg.intercept)}" stroke="#d4b832" stroke-width="1.5" stroke-dasharray="2,3" opacity="0.7"/>`;
    }
    const linePoints=pts.map((_,i)=>`${sx(i)},${sy(pts[i].score)}`).join(' ');
    const dataLine=pts.length>1?`<polyline points="${linePoints}" fill="none" stroke="#52c48a" stroke-width="2"/>`:'';
    const dots=pts.map((p,i)=>{const onT=isOnTrack(track,p.date,p.score);const clr=onT===null?'#6a8ab8':onT?'#52c48a':'#e05252';return`<circle cx="${sx(i)}" cy="${sy(p.score)}" r="4" fill="${clr}"/>`;}).join('');
    const xLabels=pts.map((p,i)=>{
      if(pts.length<=6||(i%(Math.ceil(pts.length/6))===0)||i===pts.length-1){
        const dd=new Date(p.date);const label=isNaN(dd)?p.date:`${dd.getMonth()+1}/${dd.getDate()}`;
        return`<text x="${sx(i)}" y="${H-pad.b+14}" font-size="14" fill="#6a8ab8" text-anchor="middle">${label}</text>`;
      }return'';
    }).join('');
    chartHTML=`<svg viewBox="0 0 ${W} ${H}" class="pm-chart-svg">${gridLines}${aimLine}${trendLine}${dataLine}${dots}${xLabels}</svg>`;
  } else {
    chartHTML=`<div style="display:flex;align-items:center;justify-content:center;height:140px;color:var(--text3);font-size:14px;font-family:var(--font-mono)">No data points yet</div>`;
  }
  const lastPt=pts[pts.length-1];
  const onTrack=lastPt?isOnTrack(track,lastPt.date,lastPt.score):null;
  const statusColor=onTrack===null?'var(--text3)':onTrack?'var(--strength)':'var(--critical)';
  const statusLabel=onTrack===null?'No data':onTrack?'On Track':'Needs Attention';
  let projected='—';
  if(reg&&pts.length>=2&&track.goal&&track.goalDate){
    const projDays=Math.ceil((new Date(track.goalDate)-new Date(pts[pts.length-1].date))/86400000/7);
    projected=Math.round(reg.slope*(pts.length-1+projDays)+reg.intercept).toString();
  }
  const roi=reg&&pts.length>=2?`${reg.slope>=0?'+':''}${reg.slope.toFixed(1)}/probe`:'—';
  const pointRows=pts.slice(-5).map((p,i,arr)=>{
    const idx=pts.length-arr.length+i;
    const onT=isOnTrack(track,p.date,p.score);
    const dot=onT===null?'●':onT?'<span style="color:var(--strength)">●</span>':'<span style="color:var(--critical)">●</span>';
    return`<tr><td class="mono center">${dot}</td><td class="mono">${p.date}</td><td class="mono center">${p.score}</td><td class="center"><button class="btn btn-sm btn-danger" onclick="removePMPoint('${pmSelectedStudent}','${track.id}',${idx})">✕</button></td></tr>`;
  }).join('');
  const isEditing=pmEditingTrack===track.id;
  return`<div class="pm-track-card" id="pmtrack-${track.id}">
    <div class="pm-track-header">
      <div class="pm-track-name">${track.name}</div>
      <span class="${track.tier==3?'tier-3-badge':'tier-2-badge'}">Tier ${track.tier}</span>
      <span style="font-size:14px;color:${statusColor};font-family:var(--font-mono);font-weight:500">${statusLabel}</span>
      <button class="btn btn-sm" onclick="editPMTrack('${track.id}')">${isEditing?'Close':'Edit Goal'}</button>
      <button class="btn btn-sm btn-danger" onclick="deletePMTrack('${pmSelectedStudent}','${track.id}')">Delete Track</button>
    </div>
    ${isEditing?renderPMTrackEditForm(track):''}
    <div class="pm-chart-wrap">${chartHTML}</div>
    <div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);margin-bottom:10px;display:flex;gap:16px">
      <span><span style="color:#4a9ee0">─ ─</span> Aim line</span>
      <span><span style="color:#d4b832">─ ─</span> Trend</span>
      <span><span style="color:#52c48a">─</span> Actual</span>
    </div>
    <div class="pm-track-stats">
      <div class="pm-stat"><div class="pm-stat-label">Baseline</div><div class="pm-stat-val">${track.baseline??'—'}</div></div>
      <div class="pm-stat"><div class="pm-stat-label">Goal</div><div class="pm-stat-val">${track.goal??'—'}</div><div class="pm-stat-sub">by ${track.goalDate||'—'}</div></div>
      <div class="pm-stat"><div class="pm-stat-label">Current</div><div class="pm-stat-val">${lastPt?lastPt.score:'—'}</div></div>
      <div class="pm-stat"><div class="pm-stat-label">Rate of Improvement</div><div class="pm-stat-val" style="font-size:14px">${roi}</div></div>
      <div class="pm-stat"><div class="pm-stat-label">Projected at Goal Date</div><div class="pm-stat-val" style="font-size:14px">${projected}</div></div>
    </div>
    ${pts.length?`<div style="margin-bottom:12px"><div style="font-size:14px;color:var(--text3);font-family:var(--font-mono);margin-bottom:6px">RECENT DATA POINTS</div><div class="table-wrap"><table><thead><tr><th class="center">Status</th><th>Date</th><th class="center">Score</th><th class="center">Remove</th></tr></thead><tbody>${pointRows}</tbody></table></div></div>`:''}
    <div class="pm-add-point">
      <div class="settings-field"><label>Probe Date</label><input type="date" id="pm-date-${track.id}" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="settings-field"><label>Score</label><input type="number" id="pm-score-${track.id}" placeholder="e.g. 82" min="0"></div>
      <button class="btn btn-primary" style="margin-top:18px" onclick="addPMPoint('${pmSelectedStudent}','${track.id}')">+ Add Data Point</button>
    </div>
    ${track.notes?`<div style="font-size:14px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><strong style="color:var(--text2)">Notes:</strong> ${track.notes}</div>`:''}
  </div>`;
}
