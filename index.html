    const winInputs=WINDOWS.map(w=>`<div class="settings-field"><label>${config.domainNames[d]} ${w} Benchmark</label><input type="number" id="bm-${d}-${w}" value="${getBenchmark(d,w)}" min="0" max="999"></div>`).join('');
    const dnField=`<div class="settings-field"><label>${d} Domain Name</label><input type="text" id="dn-${d}" value="${config.domainNames[d]}"></div>`;
    return`<div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px">${dnField}${winInputs}</div>`;
  }).join('');
  const activeWinInputs=WINDOWS.map(w=>`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;color:var(--text2)"><input type="radio" name="active-window" value="${w}" ${currentWindow===w?'checked':''} onchange="currentWindow=this.value;config.activeWindow=this.value"> ${w}</label>`).join('');

  const scales=[
    {id:'sm',label:'Small',sub:'~88%'},
    {id:'md',label:'Medium',sub:'Default'},
    {id:'lg',label:'Large',sub:'~115%'},
    {id:'xl',label:'X-Large',sub:'~130%'},
  ];
  const scaleButtons=scales.map(s=>`
    <button class="scale-btn ${currentScale===s.id?'active':''}" onclick="setScale('${s.id}')">
      <span class="scale-btn-label">${s.label}</span>
      <span class="scale-btn-sub">${s.sub}</span>
    </button>`).join('');

  const themes=[
    {id:'navy',   name:'Navy',    sub:'Default — deep blue',
     swatches:['#0f1f3d','#1a2e52','#4a9ee0']},
    {id:'slate',  name:'Slate',   sub:'Light — warm off-white',
     swatches:['#f2f0eb','#faf8f5','#2d6fa8']},
    {id:'obsidian',name:'Obsidian',sub:'Dark — high contrast',
     swatches:['#0d0d0d','#161616','#58a6e6']},
  ];
  const themeButtons=themes.map(t=>`
    <button class="theme-btn ${currentTheme===t.id?'active':''}" onclick="setTheme('${t.id}')" style="min-width:140px">
      <div class="theme-swatch">
        ${t.swatches.map(c=>`<div class="theme-swatch-block" style="background:${c}"></div>`).join('')}
      </div>
      <span class="theme-btn-name">${t.name}</span>
      <span class="theme-btn-sub">${t.sub}</span>
    </button>`).join('');

  return`<div>
    <div class="panel-header"><div class="panel-header-left"><div class="panel-title">Settings</div><div class="panel-sub">display preferences · saved to this browser</div></div></div>

    <div class="settings-section">
      <div class="settings-title">Font &amp; Content Size</div>
      <p style="font-size:14px;color:var(--text3);margin-bottom:16px">Scales all content in the main panel. The navigation bar stays fixed.</p>
      <div class="display-setting-group">${scaleButtons}</div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Color Scheme</div>
      <p style="font-size:14px;color:var(--text3);margin-bottom:16px">Choose a theme for the dashboard. Your preference is saved automatically.</p>
      <div class="display-setting-group">${themeButtons}</div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Active Assessment Window</div>
      <p style="font-size:14px;color:var(--text3);margin-bottom:12px">Select which window to display by default.</p>
      <div style="display:flex;gap:20px">${activeWinInputs}</div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Domain Names &amp; Benchmarks by Window</div>
      <p style="font-size:14px;color:var(--text3);margin-bottom:12px">Set benchmark targets per domain per window.</p>
      <div style="display:grid;gap:10px">${bmFields}</div>
      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveConfig()">Save Settings</button>
        <button class="btn" onclick="resetConfig()">Reset to Defaults</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function saveConfig(){
  DOMAINS.forEach(d=>{
    const dnEl=document.getElementById(`dn-${d}`);if(dnEl)config.domainNames[d]=dnEl.value||d;
    WINDOWS.forEach(w=>{
      const bmEl=document.getElementById(`bm-${d}-${w}`);
      if(bmEl){if(!config.benchmarks[d]||typeof config.benchmarks[d]==='number')config.benchmarks[d]={BOY:70,MOY:75,EOY:80};config.benchmarks[d][w]=parseFloat(bmEl.value)||75;}
    });
  });
  const activeEl=document.querySelector('input[name="active-window"]:checked');
  if(activeEl){currentWindow=activeEl.value;config.activeWindow=activeEl.value;}
  saveConfigToStorage();showToast('Settings saved.');render();
}
function resetConfig(){config.benchmarks=JSON.parse(JSON.stringify(DEFAULT_BENCHMARKS));config.domainNames={...DEFAULT_DOMAIN_NAMES};saveConfigToStorage();render();showToast('Reset to defaults.');}
function loadSampleData(){students=JSON.parse(JSON.stringify(RAW_STUDENTS));showToast('Sample data loaded.');switchTab('heatmap');}
function clearData(){if(!confirm('Clear all student data?'))return;students=[];showToast('Data cleared.');render();}
function clearMapper(){importedHeaders=[];importedRows=[];columnMapping={};render();}
function gotoStudent(name){
  const data=computeStats();
  const sorted=[...data].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  const idx=sorted.findIndex(s=>s.name===name);
  if(idx>=0){selectedStudent=idx;switchTab('profile');}
}
function exportCSV(){
  if(!students.length){showToast('No data to export.');return;}
  const data=computeStats();
  const scoreHeaders=DOMAINS.flatMap(d=>WINDOWS.map(w=>`${config.domainNames[d]}_${w}`));
  const headers=['Student',...scoreHeaders,...DOMAINS.map(d=>`${d}_CohortZ_${currentWindow}`),...DOMAINS.map(d=>`${d}_BMZ_${currentWindow}`),'Weakest','MinZ','Flagged'];
  const rows=data.map(s=>[s.name,...DOMAINS.flatMap(d=>WINDOWS.map(w=>getScore(students.find(st=>st.Student===s.name),d,w)??'')),...DOMAINS.map(d=>s[d].cohortZ!==null?fmt(s[d].cohortZ,2):''),...DOMAINS.map(d=>s[d].bmZ!==null?fmt(s[d].bmZ,2):''),config.domainNames[s.weakest],fmt(s.minZ,2),s.isFlagged?'YES':'NO']);
  const csv=[headers,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mtss_export.csv';a.click();showToast('CSV exported.');
}
function downloadTemplate(){
  const headers=['Student',...DOMAINS.flatMap(d=>WINDOWS.map(w=>`${d}_${w}`))];
  const example=['Example Student',...DOMAINS.flatMap(d=>WINDOWS.map(()=>'75'))];
  const csv=[headers,example].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mtss_template.csv';a.click();showToast('Template downloaded.');
}
function parseCSVText(raw){
  const lines=raw.trim().split('\n').map(l=>l.trim()).filter(Boolean);if(!lines.length)return null;
  const headers=parseCSVLine(lines[0]);
  const rows=lines.slice(1).map(l=>{const vals=parseCSVLine(l);const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;});
  return{headers,rows};
}
function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){result.push(cur.trim());cur='';}else{cur+=c;}}
  result.push(cur.trim());return result;
}
function parseCSVPaste(){
  const raw=document.getElementById('csv-input')?.value?.trim();if(!raw){showToast('No CSV data.');return;}
  const parsed=parseCSVText(raw);if(!parsed){showToast('Could not parse CSV.');return;}
  importedHeaders=parsed.headers;importedRows=parsed.rows;autoDetectMapping();render();
}
function handleFileDrop(e){e.preventDefault();document.getElementById('drop-zone')?.classList.remove('dragover');const file=e.dataTransfer?.files?.[0];if(file)processFile(file);}
function handleFileInput(e){const file=e.target?.files?.[0];if(file)processFile(file);}
function processFile(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.csv')){
    const reader=new FileReader();
    reader.onload=e=>{const parsed=parseCSVText(e.target.result);if(!parsed){showToast('Could not parse CSV.');return;}importedHeaders=parsed.headers;importedRows=parsed.rows;autoDetectMapping();render();};
    reader.readAsText(file);
  } else if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    const reader=new FileReader();
    reader.onload=e=>{
      try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const json=XLSX.utils.sheet_to_json(ws,{header:1});
        if(!json.length){showToast('Empty sheet.');return;}
        importedHeaders=json[0].map(String);
        importedRows=json.slice(1).map(row=>{const obj={};importedHeaders.forEach((h,i)=>{obj[h]=row[i]!==undefined?String(row[i]):'';});return obj;});
        autoDetectMapping();render();
      }catch(err){showToast('Error reading Excel: '+err.message);}
    };reader.readAsArrayBuffer(file);
  } else {showToast('Please upload a .csv, .xlsx, or .xls file.');}
}
async function fetchGoogleSheets(){
  const urlEl=document.getElementById('sheets-url');if(!urlEl){showToast('URL field not found.');return;}
  let url=urlEl.value.trim();if(!url){showToast('Please enter a Google Sheets URL.');return;}
  localStorage.setItem('mtss_sheets_url',url);
  let csvUrl=url;
  if(url.includes('/edit')){csvUrl=url.replace(/\/edit.*/,'/export?format=csv');}
  else if(url.includes('/pub')){csvUrl=url.replace(/\/pub.*/,'/export?format=csv');}
  else{csvUrl=url+(url.includes('?')?'&':'?')+'output=csv';}
  try{
    showToast('Fetching...');const res=await fetch(csvUrl);if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();const parsed=parseCSVText(text);if(!parsed){showToast('Could not parse the sheet.');return;}
    importedHeaders=parsed.headers;importedRows=parsed.rows;autoDetectMapping();render();
  }catch(e){showToast('Error: '+e.message);}
}
function autoDetectMapping(){
  columnMapping={};
  const nameCol=importedHeaders.find(h=>/^(student|name|student.?name)/i.test(h));if(nameCol)columnMapping['Student']=nameCol;
  DOMAINS.forEach(d=>{
    const dName=config.domainNames[d];
    WINDOWS.forEach(w=>{
      const key=`${d}_${w}`;const seasonMap={BOY:'fall',MOY:'winter',EOY:'spring'};
      const patterns=[h=>h.toUpperCase()===`${d}_${w}`,h=>h.toLowerCase()===`${dName.toLowerCase()}_${w.toLowerCase()}`,h=>h.toLowerCase()===`${dName.toLowerCase()}_${seasonMap[w]}`,h=>new RegExp(`^${d}[_\\s-]?${w}$`,'i').test(h),h=>new RegExp(`^${dName}[_\\s-]?${w}$`,'i').test(h)];
      const match=importedHeaders.find(h=>patterns.some(p=>{try{return p(h);}catch{return false;}}));
      if(match)columnMapping[key]=match;
    });
  });
}
function applyColumnMapping(){
  const nameCol=columnMapping['Student'];if(!nameCol){showToast('Please map the Student Name column.');return;}
  const newStudents=importedRows.map((row,i)=>{
    const obj={Student:row[nameCol]||`Student ${i+1}`};
    DOMAINS.forEach(d=>WINDOWS.forEach(w=>{const col=columnMapping[`${d}_${w}`];if(col&&row[col]!==undefined&&row[col]!==''){obj[`${d}_${w}`]=parseFloat(row[col])||0;}}));
    return obj;
  }).filter(s=>s.Student);
  if(!newStudents.length){showToast('No valid student rows found.');return;}
  students=newStudents;clearMapper();showToast(`Imported ${students.length} students.`);switchTab('heatmap');
}
function addPMTrack(){
  if(!pmSelectedStudent){showToast('Select a student first.');return;}
  const id='track_'+Date.now();
  const track={id,name:'New Track',baseline:null,goal:null,goalDate:'',tier:2,startDate:new Date().toISOString().split('T')[0],notes:'',points:[]};
  if(!pmData[pmSelectedStudent])pmData[pmSelectedStudent]=[];
  pmData[pmSelectedStudent].push(track);pmEditingTrack=id;savePM();render();
}
function deletePMTrack(studentName,trackId){
  if(!confirm('Delete this track and all its data?'))return;
  pmData[studentName]=(pmData[studentName]||[]).filter(t=>t.id!==trackId);
  if(!pmData[studentName].length)delete pmData[studentName];savePM();render();
}
function editPMTrack(trackId){pmEditingTrack=pmEditingTrack===trackId?null:trackId;render();}
function savePMTrackEdit(trackId){
  const tracks=pmData[pmSelectedStudent]||[];const track=tracks.find(t=>t.id===trackId);if(!track)return;
  const get=id=>document.getElementById(id)?.value;
  track.name=get(`pme-name-${trackId}`)||track.name;track.baseline=parseFloat(get(`pme-base-${trackId}`))||0;
  track.goal=parseFloat(get(`pme-goal-${trackId}`))||0;track.goalDate=get(`pme-date-${trackId}`)||'';
  track.tier=parseInt(get(`pme-tier-${trackId}`))||2;track.notes=get(`pme-notes-${trackId}`)||'';
  pmEditingTrack=null;savePM();showToast('Track updated.');render();
}
function addPMPoint(studentName,trackId){
  const dateEl=document.getElementById(`pm-date-${trackId}`);const scoreEl=document.getElementById(`pm-score-${trackId}`);
  if(!dateEl||!scoreEl){showToast('Fields not found.');return;}
  const date=dateEl.value;const score=parseFloat(scoreEl.value);
  if(!date||isNaN(score)){showToast('Enter a valid date and score.');return;}
  const tracks=pmData[studentName]||[];const track=tracks.find(t=>t.id===trackId);if(!track)return;
  track.points.push({date,score});track.points.sort((a,b)=>new Date(a.date)-new Date(b.date));
  savePM();scoreEl.value='';showToast(`Added: ${score} on ${date}`);render();
}
function removePMPoint(studentName,trackId,idx){
  const tracks=pmData[studentName]||[];const track=tracks.find(t=>t.id===trackId);if(!track)return;
  track.points.splice(idx,1);savePM();showToast('Data point removed.');render();
}
function bindEvents(){}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// ============================================================
// DISPLAY PREFERENCES — scale & theme
// ============================================================
let currentScale = localStorage.getItem('mtss_scale')||'md';
let currentTheme = localStorage.getItem('mtss_theme')||'navy';

function applyDisplayPrefs(){
  // Scale
  const panel = document.getElementById('main-panel');
  if(panel){
    panel.classList.remove('scale-sm','scale-md','scale-lg','scale-xl');
    panel.classList.add(`scale-${currentScale}`);
  }
  // Theme
  document.documentElement.setAttribute('data-theme', currentTheme);
  // Header bg needs to follow theme too
  const hdr = document.querySelector('.app-header');
  if(hdr) hdr.style.background = 'var(--navy3)';
  document.body.style.background = 'var(--bg)';
}

function setScale(s){
  currentScale = s;
  localStorage.setItem('mtss_scale', s);
  applyDisplayPrefs();
  render(); // re-render so active button updates
}

function setTheme(t){
  currentTheme = t;
  localStorage.setItem('mtss_theme', t);
  applyDisplayPrefs();
  render();
}

if(!students.length)students=JSON.parse(JSON.stringify(RAW_STUDENTS));
applyDisplayPrefs();
render();
</script>
